characters.list=alkosmen,tolya_mozol,vyatskiy_ebobo,cops

character.alkosmen.name=Алкосмен
character.alkosmen.role=Главный герой
character.alkosmen.description=Похмельный антигерой неонового города. Шатается по районам, собирает бутылки и пытается выжить в ночном угаре.

character.tolya_mozol.name=Толя Мозоль
character.tolya_mozol.role=Шутливый местный NPC
character.tolya_mozol.description=Мутный и запоминающийся знакомый с района. Вечно шутит про брагу, самогон и сомнительные настойки.

character.vyatskiy_ebobo.name=Вятский Ебобо
character.vyatskiy_ebobo.role=Хаотичный комедийный персонаж
character.vyatskiy_ebobo.description=Появляется внезапно, несет дичь и исчезает так же быстро. Не босс и не легенда, а ходячий городской абсурд.

character.cops.name=Менты
character.cops.role=Патруль и силовое давление города
character.cops.description=Базовые противники и постоянный источник напряжения. Патрулируют районы и прессуют Алкосмена.