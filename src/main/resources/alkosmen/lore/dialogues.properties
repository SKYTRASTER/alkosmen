dialogue.tolya_mozol.1=Толя Мозоль: Брага сегодня добрая, но ноги твои злее.
dialogue.tolya_mozol.2=Толя Мозоль: Самогон шепчет, что тебе пора в другой район.
dialogue.tolya_mozol.3=Толя Мозоль: Настойка бодрит только до первого мента за углом.

dialogue.vyatskiy_ebobo.1=Вятский Ебобо: Я не потерялся, я так навигируюсь.
dialogue.vyatskiy_ebobo.2=Вятский Ебобо: Ночь нормальная, это реальность кривая.
dialogue.vyatskiy_ebobo.3=Вятский Ебобо: Если фонарь моргнул три раза, это мой лайк.

dialogue.cops.1=Менты: Стоять. Район на проверке.
dialogue.cops.2=Менты: Документы потом, сначала руки видно.
dialogue.cops.3=Менты: Еще шаг и разговор будет короткий.